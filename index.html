<!DOCTYPE html>
<html>
<head>
    <title>G's Game Vault</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; padding: 20px; }
        .game-card { background: #333; padding: 10px; border-radius: 10px; cursor: pointer; text-decoration: none; color: white; }
        .game-card img { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>My Unblocked Games</h1>
    <div class="grid">
        <a href="game1.html" class="game-card">
            <img src="https://via.placeholder.com/150" alt="Game 1">
            <p>Example Game</p>
        </a>
    </div>
</body>
</html>
